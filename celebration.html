<!DOCTYPE html>
<html>
<head>
  <title>Celebration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: pink;
      color: darkred;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
    }

    /* Balloon styling */
    .balloon {
      position: absolute;
      bottom: -150px;
      border-radius: 50%;
      animation: rise 6s linear forwards;
    }
    @keyframes rise {
      0% { bottom: -150px; opacity: 0; }
      20% { opacity: 1; }
      100% { bottom: 100%; opacity: 0; }
    }

    #message {
      display: none;
      font-size: 6vw;   /* scales with screen width */
      font-weight: bold;
      color: purple;
      margin-top: 20px;
    }

    #card {
      display: none;
      margin: 30px auto;
      width: 90%;           /* fills most of the screen */
      max-width: 400px;     /* limit on larger screens */
      min-height: 180px;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      font-size: 4vw;       /* scales with screen size */
      font-weight: bold;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 15px;
      opacity: 0;
      transition: opacity 1s ease;
    }
  </style>
</head>
<body>
  

  <div id="message">🎈Happy Birthday Beautiful🎈</div>

  <div id="card">
    💖 Dear Mom, wishing you endless joy and love today! 💖
  </div>

<script>
    window.onload = function() {
      // Continuously spawn balloons every 500ms
      setInterval(()=>{
        let balloon = document.createElement("div");
        balloon.className = "balloon";

        // Randomize color
        const colors = ["#ff6666","#ffcc00","#66ccff","#ff99cc","#66ff66"];
        balloon.style.background = colors[Math.floor(Math.random()*colors.length)];

        // Randomize horizontal position
        balloon.style.left = Math.random()*window.innerWidth + "px";

        // Responsive balloon size
        let size = (window.innerWidth < 500 ? 30 : 50) + Math.random()*40;
        balloon.style.width = size + "px";
        balloon.style.height = (size*1.3) + "px";

        document.body.appendChild(balloon);
        setTimeout(()=>balloon.remove(),6000);
      }, 500);

      // Show surprise message
      setTimeout(()=>{
        document.getElementById("message").style.display = "block";
      }, 1000);

      // Show card after message
      setTimeout(()=>{
        let card = document.getElementById("card");
        card.style.display = "flex";
        card.style.opacity = "1"; // fade-in effect
      }, 2500);
    }
  </script>
</body>
</html>
